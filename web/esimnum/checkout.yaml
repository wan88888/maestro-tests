url: https://esimnum.com
env:
  COUNTRY: ${COUNTRY || "United States"}
---
- launchApp

- runFlow:
    when:
        visible: "Accept all"
    commands:
        - tapOn: "Accept all"

- tapOn: "Choose your destination"
- tapOn:
    css: "#destination-search"
- inputText: ${COUNTRY}
- tapOn:
    css: "#destination-search-modal-destinations-list a.dsm-destination-item"
    containsDescendants:
      - text: "^${COUNTRY}$"

- tapOn: "Go to Checkout"
- assertVisible: "You must log in to continue"
