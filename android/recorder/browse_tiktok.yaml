appId: vidma.screenrecorder.videorecorder.videoeditor.pro
---
- launchApp:
    appId: com.zhiliaoapp.musically
    stopApp: false

- extendedWaitUntil:
    visible: "For You"
    timeout: 60000

- repeat:
    times: 5
    commands:
      - swipe:
          direction: UP
          waitToSettleTimeoutMs: 2000
      - waitForAnimationToEnd:
          timeout: 3000
