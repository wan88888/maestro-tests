appId: com.talknow.free.text.me.now.second.phone.number.burner.app
---
- launchApp

- runFlow:
    when:
        visible: "Log in / Sign up"
    file: login.yaml

- tapOn: "Message"
- tapOn:
    id: "searchLayout"
- inputText: "6502234107"
- tapOn: "Type your message here"
- inputText: "hello"
- tapOn:
    id: "btnSendMessage"

- tapOn:
    id: "btnSendImage"
- tapOn: "Photos"
- tapOn:
    id: "icon_thumbnail"
- tapOn:
    id: "ivBack"

- tapOn: "History"
- tapOn: "Message"
- assertVisible:
    id: "clHistoryContent"
