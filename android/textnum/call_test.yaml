appId: com.talknow.free.text.me.now.second.phone.number.burner.app
---
- launchApp

- runFlow:
    when:
        visible: "Log in / Sign up"
    file: textnum_login.yaml

- tapOn: "Call"
- tapOn: "+1"
- longPressOn:
    id: "ivDial"
    index: 13
- inputText: "+16502234107"
- hideKeyboard

- tapOn:
    id: "ivDial"
    index: 12
- tapOn:
    id: "ivHangup"

- tapOn: "History"
- assertVisible: "Outbound"
