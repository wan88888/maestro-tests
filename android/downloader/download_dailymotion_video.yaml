appId: free.video.downloader.converter.music
androidWebViewHierarchy: devtools
---
- launchApp
- tapOn: "Dailymotion"

- tapOn:
    text: "I understand"
    optional: true

- extendedWaitUntil:
    visible: "Like"
    timeout: 60000

- tapOn:
    containsDescendants:
      - text: "Like"
    index: 0
    point: "50%,35%"

- extendedWaitUntil:
    visible:
        id: "completeLoadView"
    timeout: 60000

- tapOn:
    id: "completeLoadView"

- tapOn:
    id: "item_cl"

- tapOn: "Download"

- tapOn:
    id: "ivClose"

- tapOn:
    id: "ivTabs2"

- tapOn:
    id: "ivClose"

- stopApp