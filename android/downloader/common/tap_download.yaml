appId: free.video.downloader.converter.music
---
- tapOn:
    id: "completeLoadView"
- runFlow:
    when:
      true: ${DOWNLOAD_STYLE == 'list'}
    commands:
      - tapOn:
          id: "item_cl"
      - tapOn: "Download"
- runFlow:
    when:
      true: ${DOWNLOAD_STYLE == 'float'}
    commands:
      - tapOn:
          id: "downloadView"
- tapOn:
    id: "ivClose"
