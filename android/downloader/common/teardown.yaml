appId: free.video.downloader.converter.music
---
- runFlow:
    when:
      true: ${TEARDOWN_MODE != 'home' && TEARDOWN_MODE != 'home_stop'}
    commands:
      - tapOn:
          id: "ivTabs2"
          optional: true
      - tapOn:
          id: "ivClose"
          optional: true

- runFlow:
    when:
      true: ${TEARDOWN_MODE == 'home' || TEARDOWN_MODE == 'home_stop'}
    commands:
      - tapOn:
          id: "ivGoHome"
          optional: true
      - tapOn:
          id: "ivClose"
          optional: true

- runFlow:
    when:
      true: ${TEARDOWN_MODE == 'home_stop'}
    commands:
      - stopApp
